# Full stack for local/prod-like runs. Dockerfiles for api/web are added in
# Phase 3 — until then, develop with `uv run uvicorn` + `npm run dev`.
# Bring up just the infra now if you want: `docker compose up db chroma`.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carassistant}
      POSTGRES_DB: ${POSTGRES_DB:-carassistant}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carassistant}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started

  web:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  chromadata:
